# Example configuration for grok-bridge.
# Prefer env overrides for secrets: GROK_BRIDGE_ADMIN_PASSWORD, GROK_BRIDGE_LISTEN, GROK_BRIDGE_SQLITE_PATH.
# Server refuses to start if admin.password is empty or "change-me".

server:
  listen: "0.0.0.0:8080"
  # Optional second listener for admin UI/API only (public routes stay on listen).
  # When set, /admin and /admin/api/* are served only on this address.
  # admin_listen: "127.0.0.1:8081"
  # Or: GROK_BRIDGE_ADMIN_LISTEN=127.0.0.1:8081

admin:
  # REQUIRED: set a strong password (not "change-me"). Prefer GROK_BRIDGE_ADMIN_PASSWORD.
  password: ""
  session_ttl: 24h

data:
  sqlite_path: "./data/grok-bridge.db"

proxy:
  # Optional upstream proxy for xAI/OAuth (http://127.0.0.1:7890 or socks5://...).
  # Empty = use HTTP(S)_PROXY env if set. Or: GROK_BRIDGE_HTTP_PROXY=...
  http_proxy: ""
  # Account scheduling: round_robin | weighted (weight editable per account in admin UI)
  scheduling: "round_robin"
  # Concurrency gates (0 = unlimited)
  max_concurrency: 0
  account_concurrency: 0
  retry:
    max_account_switches: 2
    max_transient_retries: 2
  log_bodies: "errors_only"
  log_retention_days: 30
  unknown_model: "passthrough"  # or strict

models:
  - id: grok-4.5
  - id: grok-4.3
  - id: grok-3-mini

aliases:
  "claude-sonnet-4-20250514": "grok-4.5"
  "gpt-5": "grok-4.5"

xai:
  # base_url usually empty; resolve like CPA for Build/OAuth
