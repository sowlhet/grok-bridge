name: Desktop Windows x64

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'desktop/**'
      - 'grok-bridge/**'
      - '.github/workflows/desktop-windows.yml'

permissions:
  contents: write

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Go sidecar (windows amd64)
        working-directory: grok-bridge
        shell: bash
        run: |
          mkdir -p ../desktop/src-tauri/binaries
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -H windowsgui -X main.Version=${GITHUB_REF_NAME:-dev}"             -o ../desktop/src-tauri/binaries/grok-bridge-x86_64-pc-windows-msvc.exe ./cmd/server
          ls -lah ../desktop/src-tauri/binaries

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci || npm install

      - name: Build Tauri Windows package
        working-directory: desktop
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grok-bridge-desktop-windows-x64
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/*.exe

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
